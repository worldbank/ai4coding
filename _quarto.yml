project:
  type: website
  render:
    - about.qmd
    - index.qmd
    # - materials/index.qmd
    - materials/prerequisites/*
    - materials/day1/*.qmd
    # - materials/day2/*.qmd
    # - materials/selfstudy/*.qmd


website:
  title: "AI for Coding"
  navbar:
    background: primary
    search: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Materials"
        href: materials/index.qmd
      - text: "About"
        href: about.qmd

  sidebar:
    - title: "Materials"
      style: "docked"
      pinned: true
      collapse-level: 10
      contents:
        - section: "Pre-requisites"
          href: materials/prerequisites/index.qmd
          contents:
            - materials/prerequisites/software.qmd
            - materials/prerequisites/github.qmd
            - materials/prerequisites/extensions.qmd
            - materials/prerequisites/assistant.qmd
            - materials/prerequisites/common-problems.qmd
        - section: "Day 1"
          href: materials/day1/index.qmd
          # contents:
            # - materials/day1/slides.qmd
            # - materials/day1/ai-overview.qmd
            # - materials/day1/case-studies.qmd
        - section: "Self Study"
          href: materials/selfstudy/index.qmd
  #       #   # contents:
  #       #     # - materials/self-study/case-studies.qmd
        - section: "Day 2"
          href: materials/day2/index.qmd
  #       #   # contents:
  #       #     # - materials/day2/advanced-topics.qmd
  #       #     # - materials/day2/case-studies.qmd
  page-navigation: true
  back-to-top-navigation: true

execute:
  freeze: true

format:
  html:
    theme:
      - cosmo
      - brand
    toc: true
    toc-location: right
    lightbox: true
