project:
  type: website
  render:
    - about.qmd
    - index.qmd
    - materials.qmd
    - prerequisites/*.qmd
    - day1/*.qmd


website:
  title: "AI for Coding"
  navbar:
    background: primary
    search: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Materials"
        href: materials.qmd
      - text: "About"
        href: about.qmd

  sidebar:
    - title: "Materials"
      style: "docked"
      pinned: true
      collapse-level: 10
      contents:
        - materials.qmd
        - section: "Pre-requisites"
          href: prerequisites/index.qmd
          contents:
            - prerequisites/software.qmd
            - prerequisites/github.qmd
            - prerequisites/extensions.qmd
            - prerequisites/assistant.qmd
            - prerequisites/common-problems.qmd
        - section: "Day 1"
          href: day1/index.qmd
          contents:
            - day1/demo-refactoring.qmd
        - section: "Self Study"
          href: selfstudy/index.qmd
  #       #   # contents:
  #       #     # - materials/self-study/case-studies.qmd
        - section: "Day 2"
          href: day2/index.qmd
  #       #   # contents:
  #       #     # - materials/day2/advanced-topics.qmd
  #       #     # - materials/day2/case-studies.qmd
  page-navigation: true
  back-to-top-navigation: true

execute:
  freeze: true

format:
  html:
    theme:
      - cosmo
      - brand
    toc: true
    toc-depth: 3
    toc-location: right
    lightbox: true
