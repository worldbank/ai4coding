project:
  type: website
  render:
    - about.qmd
    - index.qmd
    - materials.qmd
    - prerequisites/*.qmd
    - day1/*.qmd
    - day1/**/*.qmd


website:
  title: "AI for Coding"
  llms-txt: true
  navbar:
    background: primary
    search: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Materials"
        href: materials.qmd
      - text: "Pre-requisites"
        href: prerequisites/index.qmd
      - text: "Day 1"
        href: day1/index.qmd
      - text: "About"
        href: about.qmd

  sidebar:
    - title: Prerequisites
      style: "docked"
      pinned: true
      collapse-level: 10
      contents:
        - prerequisites/index.qmd
        - prerequisites/software.qmd
        - prerequisites/github.qmd
        - prerequisites/extensions.qmd
        - prerequisites/assistant.qmd
        - prerequisites/common-problems.qmd

    - title: "Day 1"
      style: "docked"
      pinned: true
      collapse-level: 10
      contents:
        - day1/index.qmd
        - day1/setup-overview.qmd
        - day1/ex1-1-explore-positron.qmd
        - day1/ex1-2-harmonization.qmd

    - title: "Materials"
      style: "docked"
      pinned: true
