project:
  type: website

website:
  title: "AI for Coding"
  navbar:
    background: primary
    search: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Materials"
        href: materials/index.qmd
      - text: "Exercises"
        href: exercises/index.qmd
      - text: "About"
        href: about.qmd

  sidebar:
    - title: "Materials"
      style: "docked"
      pinned: true
      collapse-level: 3
      contents:
        - materials/index.qmd
        - section: "Pre-requisites"
          contents:
            - materials/prerequisites/software.qmd
            - materials/prerequisites/github.qmd
            - materials/prerequisites/extensions.qmd
            - materials/prerequisites/assistant.qmd
            - materials/prerequisites/licenses.qmd
            - materials/prerequisites/common-problems.qmd
        - section: "Day 1"
          contents:
            - materials/day1/index.qmd
            - materials/day1/demo-refactoring.qmd
            - materials/day1/ai-overview.qmd
            - materials/day1/case-studies.qmd
        - section: "Self-Study"
          contents:
            - materials/self-study/index.qmd
            - materials/self-study/case-studies.qmd
        - section: "Day 2"
          contents:
            - materials/day2/index.qmd
            - materials/day2/advanced-topics.qmd
            - materials/day2/case-studies.qmd

    - title: "Exercises"
      style: "docked"
      pinned: true
      collapse-level: 3
      contents:
        - exercises/index.qmd

  page-navigation: true
  back-to-top-navigation: true

execute:
  freeze: true

format:
  html:
    theme:
      - cosmo
      - brand
    css: styles.css
    toc: true
    toc-location: right
    lightbox: true
